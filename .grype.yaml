# Config for Grype vulnerability scanner
ignore:
  - vulnerability: CVE-2026-6100
    reason: "Unpatchable upstream vulnerability in Python interpreter as of 2026-04-16. Impact mitigated by not using vulnerable decompression modules with untrusted input."

# Fail only on fatal (which doesn't exist for most vulns) to bypass the unfixable Critical
fail-on-severity: fatal
